version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:80'
    environment:
      - ASPNETCORE_URLS=http://+:80
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Jwt__Secret=${JWT_SECRET}
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
