<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKISA Mobile Assistant</title>
  <style>
    body { margin: 0; font-family: Inter, sans-serif; background: #020617; color: #cbd5e1; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
    .frame { width: 360px; border: 1px solid #334155; border-radius: 32px; padding: 24px; background: #0b1220; box-shadow: 0 22px 60px rgba(0,0,0,0.55); }
    h1 { margin: 0 0 16px; font-size: 1.75rem; }
    p { margin: 0 0 16px; line-height: 1.6; }
    a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="frame">
    <h1>AKISA Mobile Assistant</h1>
    <p>This mobile shell is a prototype UI for AKISA-AI on the go. It can later be converted into a React Native or .NET MAUI app.</p>
    <p>Connect to the backend at <strong>http://localhost:5000</strong> and use the browser workspace at <a href="http://localhost:3000">localhost:3000</a> inside the mobile frame.</p>
  </div>
</body>
</html>
